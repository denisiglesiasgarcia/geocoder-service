services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set (see .env.example)}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Télécharge les données SITG et (re)construit l'index au démarrage du
  # conteneur (voir entrypoint.sh) avant de lancer l'API -- idempotent, donc
  # un redémarrage ne relance pas tout le travail si l'index est à jour.
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY must be set (see .env.example)}
    volumes:
      - geocoder_data:/app/data
    depends_on:
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Le premier démarrage télécharge (~5MB) et indexe (~15s) les données
      # avant que l'API ne réponde ; ne pas compter ça comme des échecs.
      start_period: 60s

volumes:
  meili_data:
  geocoder_data:
